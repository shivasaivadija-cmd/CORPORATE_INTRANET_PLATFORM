services:
  - type: web
    name: corporate-intranet-api
    env: python
    region: oregon
    buildCommand: cd apps/api-python && pip install -r requirements.txt
    startCommand: cd apps/api-python && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: intranet-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: intranet-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: REFRESH_TOKEN_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: NODE_ENV
        value: production

databases:
  - name: intranet-db
    databaseName: intranet_db
    user: intranet

  - name: intranet-redis
    plan: starter
